# ============================================
# FastapiAdmin 开发环境 Compose — 仅用于本地热更新
# ============================================
# 使用方式:
#   docker compose --env-file .env -f docker-compose-dev.yaml up -d
# 与生产区别：backend 挂载宿主机代码用于热更新；不推荐用于部署。
# ============================================

services:
  # ==================== 数据库服务 ====================
  mysql:
    container_name: mysql_dev
    image: mysql:8.0.43
    restart: unless-stopped
    platform: linux/amd64
    environment:
      TZ: "Asia/Shanghai"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?错误: 请设置 MYSQL_ROOT_PASSWORD 环境变量}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-fastapiadmin}"
      MYSQL_USER: "${MYSQL_USER:-fastapiadmin}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?错误: 请设置 MYSQL_PASSWORD 环境变量}"
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - app_network_dev
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ==================== Redis 服务 ====================
  redis:
    container_name: redis_dev
    image: redis:7.4.5-alpine
    restart: unless-stopped
    platform: linux/amd64
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?错误: 请设置 REDIS_PASSWORD 环境变量}
      --appendonly yes
    networks:
      - app_network_dev
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== 后端服务（开发：挂载宿主机代码热更新） ====================
  backend:
    container_name: backend_dev
    build:
      context: ../
      dockerfile: ./docker/backend/Dockerfile
    image: backend:3.0.0-dev
    command: ["sh", "-c", "python main.py config-check --env=dev && python main.py upgrade --env=dev && python main.py run --env=dev"]
    restart: unless-stopped
    platform: linux/amd64
    environment:
      TZ: "Asia/Shanghai"
      ENVIRONMENT: "dev"
      SECRET_KEY: "${SECRET_KEY:-dev-only-secret-replace-before-sharing-32bytes}"
      DEBUG: "True"
      DOCS_ENABLE: "True"
      ALLOW_ORIGINS: '${ALLOW_ORIGINS:-["http://localhost:5173"]}'
      ALLOW_CREDENTIALS: "True"
      SERVER_HOST: "0.0.0.0"
      DATABASE_TYPE: "mysql"
      DATABASE_HOST: "mysql"
      DATABASE_PASSWORD: "${MYSQL_PASSWORD}"
      DATABASE_PORT: "3306"
      DATABASE_NAME: "${MYSQL_DATABASE:-fastapiadmin}"
      DATABASE_USER: "${MYSQL_USER:-fastapiadmin}"
      REDIS_HOST: "redis"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDIS_PORT: "6379"
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    # 开发环境挂载宿主机源码，热更新；仅本地使用
    volumes:
      - ../backend:/home
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network_dev
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/common/health\")' || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

# ==================== 持久化卷 ====================
volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local

# ==================== 网络 ====================
networks:
  app_network_dev:
    driver: bridge
